---
layout: default
---
<div class="wrap">
  <section class="page-head">
    <div class="hero-kicker">
      <span class="rule"></span>
      <span class="micro">{{ page.label | default: "PAGE" }}</span>
    </div>
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="hero-lead">{{ page.subtitle }}</p>{% endif %}
  </section>
</div>

<div class="wrap-narrow">
  <div class="prose">
    {{ content }}
  </div>
</div>
